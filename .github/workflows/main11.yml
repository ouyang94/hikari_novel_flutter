name: Build APK
on:
  workflow_dispatch:
  push:
    branches: [ main ]  # 可选：推送到main分支自动构建

permissions:
  contents: read  # 显式声明权限，符合GitHub安全规范

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # 强制Node.js 24，消除警告
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Configure Flutter mirror
        run: |
          echo "PUB_HOSTED_URL=https://pub.flutter-io.cn" >> $GITHUB_ENV
          echo "FLUTTER_STORAGE_BASE_URL=https://storage.flutter-io.cn" >> $GITHUB_ENV

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Check code format
        run: flutter format --set-exit-if-changed .  # 新增：代码格式检查，提前拦截问题

      - name: Run Flutter analyze
        run: flutter analyze --no-pub --no-fatal-infos  # 新增：静态代码分析

      - name: Build APK
        run: flutter build apk --release --verbose

      - name: Upload APK
        uses: actions/upload-artifact@v5
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
